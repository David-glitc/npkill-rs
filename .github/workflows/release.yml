name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: npkill-rs

jobs:
  release:
    name: Build & Publish
    runs-on: [self-hosted, clems-machine]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu mingw-w64 zip

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            x86_64-unknown-linux-gnu,
            aarch64-unknown-linux-gnu,
            x86_64-pc-windows-gnu

      - name: Build x86_64 Linux
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Set env for aarch64 cross-compile
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build aarch64 Linux
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Build Windows
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package binaries
        run: |
          mkdir -p release_assets
          # x86_64 Linux
          cd target/x86_64-unknown-linux-gnu/release
          tar czf ../../../release_assets/${{ env.BIN_NAME }}-x86_64-unknown-linux-gnu.tar.gz ${{ env.BIN_NAME }}
          cd ../../..

          # aarch64 Linux
          cd target/aarch64-unknown-linux-gnu/release
          tar czf ../../../release_assets/${{ env.BIN_NAME }}-aarch64-unknown-linux-gnu.tar.gz ${{ env.BIN_NAME }}
          cd ../../..

          # Windows
          cd target/x86_64-pc-windows-gnu/release
          zip ../../../release_assets/${{ env.BIN_NAME }}-x86_64-pc-windows-gnu.zip ${{ env.BIN_NAME }}.exe
          cd ../../..

          cd release_assets
          sha256sum * > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
